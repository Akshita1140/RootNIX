services:
  server:
    build: ./server
    env_file: ./server/.env
    ports:
      - "8000:8000"
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:80"
    depends_on:
      - server
